description:
  en:
    localisedName: jme-bptest-example
    shortDescription: Example project demonstrating how to run jEAP business process tests with the jEAP Business Process Test Orchestrator.
    longDescription: >
      This example project demonstrates how to use the jEAP business process test libraries
      jeap-bptest-orchestrator and jeap-bptestagent-api. It contains a small example business process
      spanning two microservices (an order service and a billing service), two test agents that drive
      and verify these services, and a business process test orchestrator instance that coordinates
      the test agents to run an end-to-end business process test across the services.
    features:
      - Business process test orchestrator instance based on jeap-bptest-orchestrator
      - Test agents implementing the jeap-bptestagent-api TestAgentOperations contract
      - Example business process spanning an order service and a billing service
      - End-to-end business process test case (OrderBillingHappyPath)
